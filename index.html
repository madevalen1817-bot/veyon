<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Oficial - Soporte y Reparación - Instituto NOA</title>
    <!-- Evitar error de favicon -->
    <link rel="icon" href="data:,">
    <!-- Iconos y Fuentes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff6600;
            --primary-dark: #d35400;
            --secondary-color: #1a1a1a;
            --accent-color: #27ae60;
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; min-height: 100vh; padding: 20px;
        }

        .container {
            width: 100%; max-width: 800px;
            background: var(--card-bg); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden; display: flex; flex-direction: column; position: relative;
        }

        header {
            background: linear-gradient(135deg, var(--secondary-color), #2d2d2d);
            color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .timer-badge {
            background: white; color: var(--primary-color);
            padding: 5px 15px; border-radius: 20px;
            font-weight: bold; font-size: 1.2rem;
        }

        .progress-container { background-color: #eee; height: 8px; width: 100%; }
        .progress-bar { background-color: var(--primary-color); height: 100%; width: 0%; transition: width 0.3s ease; }

        .screen { padding: 25px; flex: 1; display: none; flex-direction: column; align-items: center; text-align: center; }
        .screen.active { display: flex; }

        .btn {
            background-color: var(--primary-color); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 var(--primary-dark);
        }
        .btn-whatsapp { background-color: #25D366; box-shadow: 0 4px 0 #1e994a; width: 100%; }

        .question-text { font-size: 1.3rem; font-weight: 700; margin: 20px 0; color: #222; min-height: 60px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

        .option-btn {
            background: white; border: 2px solid #ddd; padding: 15px; border-radius: 8px;
            cursor: pointer; font-size: 1rem; text-align: left; color: #444; font-weight: 500;
        }
        .option-btn:hover { border-color: var(--primary-color); background: #fff8f5; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; padding: 20px; color: white;
        }

        .student-form { width: 100%; background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; }
        .form-input { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="font-weight:900;"><i class="fas fa-tools"></i> INSTITUTO NOA - SOPORTE</div>
        <div class="timer-badge" id="timerBadge" style="display:none;"><span id="timerText">20</span>s</div>
    </header>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

    <!-- INICIO -->
    <div id="startScreen" class="screen active">
        <div style="font-size: 4rem; color: var(--primary-color); margin-bottom: 10px;"><i class="fas fa-laptop-medical"></i></div>
        <h1>Diagnóstico y Reparación de PC</h1>
        <p>Evaluación técnica sobre fallas comunes, mantenimiento y hardware.</p>
        <button class="btn" onclick="startQuiz()">COMENZAR EXAMEN</button>
    </div>

    <!-- QUIZ -->
    <div id="quizScreen" class="screen">
        <p id="questionCount" style="font-weight:bold; color:var(--primary-dark);"></p>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsGrid"></div>
    </div>

    <!-- FEEDBACK -->
    <div id="feedbackOverlay" class="overlay">
        <div id="feedbackIcon" style="font-size:4rem; margin-bottom:15px;"></div>
        <h2 id="feedbackTitle"></h2>
        <p id="feedbackExplanation" style="margin: 15px 0 25px; font-size:1.1rem; max-width: 500px;"></p>
        <button class="btn" onclick="nextQuestion()">SIGUIENTE</button>
    </div>

    <!-- RESULTADOS -->
    <div id="resultScreen" class="screen">
        <h2>Resultado Final</h2>
        <div id="scoreDisplay" style="font-size:4rem; font-weight:900; color:var(--primary-color); margin:15px 0;">0/20</div>
        
        <div class="student-form">
            <label>Nombre del Alumno:</label>
            <input type="text" id="studentName" class="form-input">
            <label>DNI:</label>
            <input type="number" id="studentDNI" class="form-input">
        </div>

        <button class="btn btn-whatsapp" onclick="sendWhatsApp()">
            <i class="fab fa-whatsapp"></i> ENVIAR RESULTADO
        </button>
    </div>
</div>

<script>
    const questions = [
        { q: "Si la PC enciende pero emite pitidos constantes y no da video, ¿qué componente suele fallar?", o: ["Disco Duro", "Memoria RAM", "Fuente de poder", "Gabinete"], a: 1, e: "Los pitidos constantes al arrancar suelen ser la señal de la BIOS de que hay un problema con los módulos de RAM." },
        { q: "¿Cuál es la función principal de la pasta térmica?", o: ["Pegar el procesador", "Eliminar burbujas de aire para mejorar la conducción de calor", "Limpiar el procesador", "Aumentar la velocidad del ventilador"], a: 1, e: "La pasta térmica rellena las imperfecciones microscópicas entre el procesador y el disipador para que el calor fluya mejor." },
        { q: "Una PC se apaga sola después de 10 minutos de uso intenso. ¿Cuál es la causa más probable?", o: ["Falta de espacio en disco", "Sobrecalentamiento del procesador", "Monitor defectuoso", "Virus de teclado"], a: 1, e: "Por seguridad, las placas base apagan el sistema si el CPU alcanza temperaturas peligrosas." },
        { q: "Al encender la PC aparece el mensaje 'CMOS Checksum Error'. ¿Qué debemos reemplazar?", o: ["El procesador", "La pila CR2032 de la placa madre", "La memoria RAM", "El cable SATA"], a: 1, e: "Este error indica que la pila que mantiene la configuración de la BIOS se ha agotado." },
        { q: "¿Qué herramienta es indispensable para proteger los componentes de descargas electrostáticas?", o: ["Guantes de látex", "Pulsera antiestática", "Destornillador imantado", "Trapo húmedo"], a: 1, e: "La pulsera antiestática iguala nuestro potencial eléctrico con el del chasis para evitar dañar circuitos sensibles." },
        { q: "Si un disco duro hace ruidos metálicos (cliqueos), ¿qué tipo de falla es?", o: ["Falla de software", "Falla física mecánica", "Falla de drivers", "Falla de Windows"], a: 1, e: "Los ruidos mecánicos indican que el cabezal o el motor del disco duro están dañados físicamente." },
        { q: "¿Cuál es el primer paso antes de abrir un gabinete para mantenimiento?", o: ["Quitar la RAM", "Desconectar la fuente de la corriente eléctrica", "Limpiar el monitor", "Instalar un antivirus"], a: 1, e: "La seguridad es primero: siempre se debe trabajar sin energía eléctrica conectada." },
        { q: "¿Qué componente convierte la corriente alterna (AC) en corriente continua (DC)?", o: ["La placa base", "La fuente de alimentación", "El procesador", "El inversor de giro"], a: 1, e: "La fuente recibe 220v/110v AC y entrega voltajes bajos en DC (12v, 5v, 3.3v)." },
        { q: "Un cliente dice que su PC está 'muy lenta'. Al revisar, el disco está al 100% de uso. ¿Qué mejora técnica es la más efectiva?", o: ["Limpiar el gabinete", "Cambiar el HDD por un SSD", "Pintar el gabinete", "Cambiar el teclado"], a: 1, e: "Un SSD es hasta 10 veces más rápido que un HDD mecánico, eliminando los cuellos de botella." },
        { q: "¿Para qué sirve el comando 'chkdsk' en Windows?", o: ["Para borrar fotos", "Para reparar errores en el sistema de archivos del disco", "Para cambiar el fondo", "Para apagar la PC"], a: 1, e: "CheckDisk analiza el disco en busca de sectores defectuosos o errores lógicos." },
        { q: "Si la PC no enciende absolutamente nada (ni luces, ni ventiladores), ¿qué es lo primero a probar?", o: ["El mouse", "El cable de energía y la fuente", "El sistema operativo", "La lectora de DVD"], a: 1, e: "Se debe verificar la cadena de alimentación: enchufe, cable y fuente de poder." },
        { q: "¿Qué significan las siglas 'POST' en informática?", o: ["Power On Self Test", "Primary Operating System Text", "Point of Support Technical", "Procesador de Operaciones Standard"], a: 0, e: "El POST es la autocomprobación que realiza la PC al encenderse para verificar el hardware básico." },
        { q: "¿Con qué producto químico se deben limpiar los contactos de una memoria RAM?", o: ["Agua y jabón", "Alcohol isopropílico", "Perfume", "Aceite"], a: 1, e: "El alcohol isopropílico se evapora rápido y no deja residuos, ideal para componentes electrónicos." },
        { q: "Si Windows muestra una pantalla azul (BSOD), ¿dónde podemos encontrar la causa?", o: ["En el manual del gabinete", "En el código de error que aparece en la pantalla", "En la etiqueta de la fuente", "En el teclado"], a: 1, e: "El código de error (como CRITICAL_PROCESS_DIED) nos guía hacia el driver o hardware fallido." },
        { q: "¿Qué componente se encarga de dar video si no hay una placa de video dedicada?", o: ["El disco duro", "Los gráficos integrados del procesador", "La memoria RAM", "La fuente"], a: 1, e: "Muchos procesadores modernos incluyen un núcleo gráfico (iGPU) para dar imagen." },
        { q: "¿Qué es formatear un disco?", o: ["Limpiar el polvo", "Preparar la estructura lógica para organizar archivos (borrando todo)", "Cambiarle los cables", "Ponerle una clave"], a: 1, e: "Formatear elimina los datos y crea un nuevo sistema de archivos (NTFS, FAT32, etc.)." },
        { q: "El cooler del procesador está lleno de tierra. ¿Qué efecto produce?", o: ["La PC vuela", "Sube la temperatura por falta de flujo de aire", "El disco se llena", "El teclado no escribe"], a: 1, e: "El polvo actúa como aislante térmico y bloquea el paso del aire frío." },
        { q: "¿Para qué sirve entrar a la BIOS/UEFI?", o: ["Para escribir cartas", "Para configurar el hardware, orden de arranque y fecha/hora", "Para navegar por internet", "Para ver películas"], a: 1, e: "La BIOS es el firmware de bajo nivel que gestiona cómo interactúa el hardware con el software." },
        { q: "¿Cómo se llama el slot donde se conecta la placa de video moderna?", o: ["SATA", "PCI Express x16", "IDE", "DIMM"], a: 1, e: "PCIe x16 es el estándar actual para conectar tarjetas gráficas de alto rendimiento." },
        { q: "¿Cuál es la principal causa de falla en equipos portátiles (Notebooks)?", o: ["Falta de batería", "Acumulación de calor y falta de mantenimiento interno", "Pantalla muy brillante", "Color del plástico"], a: 1, e: "Debido a su espacio reducido, la falta de limpieza y cambio de pasta térmica daña las notebooks rápidamente." }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timer;
    let timeLeft = 20;

    // ESTA ES LA FUNCIÓN QUE FALTABA
    function startQuiz() {
        document.getElementById('startScreen').classList.remove('active');
        document.getElementById('quizScreen').classList.add('active');
        document.getElementById('timerBadge').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestion >= questions.length) {
            showResults();
            return;
        }
        const q = questions[currentQuestion];
        document.getElementById('questionCount').innerText = `PREGUNTA ${currentQuestion + 1} DE 20`;
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('progressBar').style.width = `${(currentQuestion / 20) * 100}%`;

        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            grid.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        timeLeft = 20;
        document.getElementById('timerText').innerText = timeLeft;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timerText').innerText = timeLeft;
            if (timeLeft <= 0) checkAnswer(-1);
        }, 1000);
    }

    function checkAnswer(idx) {
        clearInterval(timer);
        const q = questions[currentQuestion];
        const overlay = document.getElementById('feedbackOverlay');
        const icon = document.getElementById('feedbackIcon');
        
        if (idx === q.a) {
            score++;
            icon.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i>';
            document.getElementById('feedbackTitle').innerText = "¡CORRECTO!";
            document.getElementById('feedbackTitle').style.color = "#2ecc71";
        } else {
            icon.innerHTML = '<i class="fas fa-times-circle" style="color:#e74c3c;"></i>';
            document.getElementById('feedbackTitle').innerText = idx === -1 ? "TIEMPO AGOTADO" : "INCORRECTO";
            document.getElementById('feedbackTitle').style.color = "#e74c3c";
        }
        document.getElementById('feedbackExplanation').innerText = q.e;
        overlay.style.display = 'flex';
    }

    function nextQuestion() {
        document.getElementById('feedbackOverlay').style.display = 'none';
        currentQuestion++;
        showQuestion();
    }

    function showResults() {
        document.getElementById('quizScreen').classList.remove('active');
        document.getElementById('resultScreen').classList.add('active');
        document.getElementById('timerBadge').style.display = 'none';
        document.getElementById('scoreDisplay').innerText = `${score}/20`;
        document.getElementById('progressBar').style.width = '100%';
    }

    function sendWhatsApp() {
        const name = document.getElementById('studentName').value;
        const dni = document.getElementById('studentDNI').value;
        if (!name || !dni) { alert("Completa tus datos"); return; }
        const code = `PC-REP-${Math.floor(Math.random()*900)+100}-${score}`;
        const text = `*EXAMEN REPARACIÓN PC - INSTITUTO NOA*%0A*Alumno:* ${name}%0A*DNI:* ${dni}%0A*Resultado:* ${score}/20%0A*Código:* ${code}`;
        window.open(`https://wa.me/543816490060?text=${text}`, '_blank');
    }
</script>
</body>
</html>
