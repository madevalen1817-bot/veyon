<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Técnico - Veyon y Gestión de Estaciones - Instituto NOA</title>
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff6600; /* Naranja NOA */
            --primary-dark: #d35400;
            --secondary-color: #1a1a1a; /* Negro NOA */
            --veyon-blue: #007bff;
            --accent-color: #27ae60;
            --bg-color: #f4f4f4;
            --text-color: #333333;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; min-height: 100vh; padding: 20px;
        }

        .container {
            width: 100%; max-width: 800px;
            background: var(--card-bg); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden; display: flex; flex-direction: column; position: relative;
        }

        header {
            background: linear-gradient(135deg, var(--secondary-color), #2d2d2d);
            color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .timer-badge {
            background: white; color: var(--primary-color);
            padding: 5px 15px; border-radius: 20px;
            font-weight: bold; font-size: 1.2rem;
        }

        .progress-container { background-color: #eee; height: 8px; width: 100%; }
        .progress-bar { background-color: var(--primary-color); height: 100%; width: 0%; transition: width 0.3s ease; }

        .screen { padding: 25px; flex: 1; display: none; flex-direction: column; align-items: center; text-align: center; }
        .screen.active { display: flex; }

        .btn {
            background-color: var(--primary-color); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 var(--primary-dark);
        }
        .btn-whatsapp { background-color: #25D366; box-shadow: 0 4px 0 #1e994a; width: 100%; }

        .question-text { font-size: 1.3rem; font-weight: 700; margin: 20px 0; color: #222; min-height: 60px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

        .option-btn {
            background: white; border: 2px solid #ddd; padding: 15px; border-radius: 8px;
            cursor: pointer; font-size: 1rem; text-align: left; color: #444;
        }
        .option-btn:hover { border-color: var(--primary-color); background: #fff8f5; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; padding: 20px; color: white;
        }

        .student-form { width: 100%; background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; }
        .form-input { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <header>
        <div style="font-weight:900;"><i class="fas fa-desktop"></i> INSTITUTO NOA - VEYON</div>
        <div class="timer-badge" id="timerBadge" style="display:none;"><span id="timerText">20</span>s</div>
    </header>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

    <!-- INICIO -->
    <div id="startScreen" class="screen active">
        <div style="font-size: 4rem; color: var(--veyon-blue); margin-bottom: 10px;"><i class="fas fa-network-wired"></i></div>
        <h1>Gestión de Clientes y Servidores</h1>
        <p>Evaluación sobre el uso de <b>Veyon</b> para soporte técnico en estaciones de trabajo.</p>
        
        <div style="text-align:left; background:#eef6ff; padding:15px; border-radius:10px; border-left:5px solid var(--veyon-blue); margin-top:20px;">
            <p><b>Caso de estudio:</b> El administrador necesita resolver problemas en una PC cliente sin desplazarse físicamente a la estación.</p>
        </div>

        <button class="btn" onclick="startQuiz()">COMENZAR EXAMEN</button>
    </div>

    <!-- QUIZ -->
    <div id="quizScreen" class="screen">
        <p id="questionCount" style="font-weight:bold; color:var(--primary-dark);"></p>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsGrid"></div>
    </div>

    <!-- FEEDBACK -->
    <div id="feedbackOverlay" class="overlay">
        <div id="feedbackIcon" style="font-size:4rem; margin-bottom:15px;"></div>
        <h2 id="feedbackTitle"></h2>
        <p id="feedbackExplanation" style="margin: 15px 0 25px; font-size:1.1rem; max-width: 500px;"></p>
        <button class="btn" onclick="nextQuestion()">CONTINUAR</button>
    </div>

    <!-- RESULTADOS -->
    <div id="resultScreen" class="screen">
        <h2>Evaluación Finalizada</h2>
        <div id="scoreDisplay" style="font-size:3.5rem; font-weight:900; color:var(--primary-color); margin:15px 0;">0/20</div>
        
        <div class="student-form">
            <label>Nombre del Alumno:</label>
            <input type="text" id="studentName" class="form-input" placeholder="Nombre completo">
            <label>DNI:</label>
            <input type="number" id="studentDNI" class="form-input" placeholder="Documento">
        </div>

        <button class="btn btn-whatsapp" onclick="sendWhatsApp()">
            <i class="fab fa-whatsapp"></i> ENVIAR AL DOCENTE
        </button>
    </div>
</div>

<script>
    const questions = [
        { q: "¿Cuál es el rol de la PC que controla a las demás en Veyon?", o: ["Veyon Client", "Veyon Master (Maestro)", "Estación de Trabajo", "Switch"], a: 1, e: "El Master es la aplicación administrativa desde donde se supervisan y controlan los clientes." },
        { q: "¿Cómo se llama el componente que debe estar instalado en las PCs de los alumnos (estaciones)?", o: ["Veyon Master", "Navegador Web", "Veyon Service (Servicio)", "Panel de Control"], a: 2, e: "El Veyon Service corre de fondo en las máquinas cliente para permitir que el Maestro se conecte." },
        { q: "¿Cuál es la principal ventaja de usar Veyon para un técnico de soporte?", o: ["Hacer que la PC sea más rápida", "Controlar la PC cliente de forma remota para resolver problemas", "Limpiar el hardware por dentro", "Instalar Windows"], a: 1, e: "Permite al técnico tomar control del mouse y teclado del cliente para solucionar errores sin moverse de su lugar." },
        { q: "Para que el Maestro encuentre a un Cliente en la red, ¿qué dato es indispensable?", o: ["El color del gabinete", "Nombre de Host (Hostname) o Dirección IP", "La marca del monitor", "El nombre del alumno"], a: 1, e: "Veyon utiliza la red TCP/IP, por lo que necesita identificar la PC por su nombre de red o su IP." },
        { q: "¿Qué función permite ver qué está haciendo el alumno en tiempo real?", o: ["Bloqueo", "Modo Demostración", "Monitoreo (Remote View)", "Apagado"], a: 2, e: "El monitoreo muestra miniaturas de todas las pantallas de las estaciones cliente activas." },
        { q: "¿Qué sucede cuando el técnico usa la función 'Control Remoto'?", o: ["La PC cliente se apaga", "El técnico puede usar el mouse y teclado de la PC cliente", "Se borran los archivos", "La PC cliente se desconecta de internet"], a: 1, e: "El control remoto permite manipular la estación de trabajo como si estuvieras sentado frente a ella." },
        { q: "¿Qué herramienta de seguridad utiliza Veyon para que no cualquier persona controle las PCs?", o: ["Contraseñas de Facebook", "Autenticación por claves (Pares de llaves)", "No tiene seguridad", "Cables con candado"], a: 1, e: "Usa claves públicas y privadas. El cliente solo acepta órdenes de quien tiene la llave privada correcta." },
        { q: "¿En qué situación es útil la función 'Reiniciar' de Veyon?", o: ["Cuando el cliente tiene un problema de software y requiere un reboot", "Para cambiar el procesador", "Para limpiar el teclado", "Para encender el aire acondicionado"], a: 0, e: "Reiniciar remotamente es una tarea básica de soporte para refrescar el sistema del cliente." },
        { q: "¿Qué significa que Veyon funcione bajo una arquitectura Cliente-Servidor?", o: ["Que todas las PCs son iguales", "Que una PC central pide servicios a las demás", "Que una PC (Servidor/Master) gestiona y supervisa a las demás (Clientes)", "Que solo funciona con servidores de Google"], a: 2, e: "Veyon separa las tareas: una máquina administra y las otras estaciones reciben las órdenes o supervisión." },
        { q: "Si una estación de trabajo no aparece en el Maestro, ¿cuál podría ser la causa?", o: ["La PC está apagada o el Servicio de Veyon no está corriendo", "El monitor es muy pequeño", "El alumno no sabe informática", "El mouse es inalámbrico"], a: 0, e: "Si el Veyon Service no está activo en el cliente, la comunicación maestro-cliente es imposible." },
        { q: "¿Para qué sirve el 'Veyon Configurator'?", o: ["Para jugar videojuegos", "Para configurar las llaves, accesos y ubicaciones de las PCs", "Para escribir textos", "Para navegar por Internet"], a: 1, e: "Es la herramienta técnica donde se definen los parámetros de red y seguridad del programa." },
        { q: "¿Qué permite la función de 'Bloqueo' (Lock)?", o: ["Romper la PC", "Inhabilitar el uso de la PC cliente para llamar la atención del usuario", "Ponerle una clave al SSD", "Cerrar la puerta del aula"], a: 1, e: "Bloquear pantallas es útil para que el usuario deje de usar la estación mientras el técnico explica algo o realiza un ajuste." },
        { q: "¿Cómo se llama el proceso de enviar la pantalla del Maestro a todos los Clientes?", o: ["Spam", "Modo Demostración (Demo)", "Control Remoto", "Chat"], a: 1, e: "El Modo Demo sirve para proyectar la pantalla del profesor/técnico en todas las estaciones de trabajo." },
        { q: "¿Puede Veyon funcionar a través de WiFi?", o: ["No, solo por cable", "Sí, siempre que las PCs estén en la misma red local", "Solo si hay internet satelital", "No, WiFi es solo para celulares"], a: 1, e: "Veyon funciona sobre cualquier red local (LAN), ya sea por cable ethernet o inalámbrica." },
        { q: "El 'Veyon Service' se inicia...", o: ["Manualmente cada vez que el alumno quiere", "Automáticamente con el sistema operativo", "Solo cuando hay internet", "Nunca, es manual"], a: 1, e: "Debe iniciar automáticamente para que el técnico siempre tenga acceso a la estación." },
        { q: "¿Qué permite la función 'Transferencia de Archivos'?", o: ["Enviar documentos directamente a las estaciones de trabajo", "Cambiar el disco duro", "Imprimir hojas", "Ver videos de YouTube"], a: 0, e: "Es vital para distribuir drivers o herramientas de reparación a los clientes remotamente." },
        { q: "¿Qué es una 'Ubicación' en Veyon Maestro?", o: ["Un país", "Un grupo de computadoras organizado (ej: Aula 1)", "La marca de la placa base", "La posición del GPS"], a: 1, e: "Las ubicaciones permiten agrupar PCs para administrarlas por sectores o salas de forma ordenada." },
        { q: "¿Qué pasa si las llaves de autenticación no coinciden entre Maestro y Cliente?", o: ["La PC explota", "El Maestro no podrá acceder ni controlar al Cliente", "La PC cliente irá más lento", "Se cambia el fondo de pantalla"], a: 1, e: "La seguridad de Veyon impide el acceso si no hay un emparejamiento de llaves válido." },
        { q: "¿Cuál es el beneficio de la función 'Encendido Remoto' (Wake-on-LAN)?", o: ["Ahorrar luz", "Prender las PCs clientes desde el Maestro sin ir una por una", "Cambiar la fuente de poder", "Bajar la temperatura"], a: 1, e: "Permite al administrador encender todas las estaciones de trabajo de forma simultánea desde su PC." },
        { q: "En resumen, Veyon es una herramienta de...", o: ["Diseño Gráfico", "Gestión de redes y supervisión de estaciones de trabajo", "Edición de Video", "Contabilidad"], a: 1, e: "Es una solución de software para monitorear y gestionar computadoras en entornos de red local." }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timer;
    let timeLeft = 20;

    function startQuiz() {
        document.getElementById('startScreen').classList.remove('active');
        document.getElementById('quizScreen').classList.add('active');
        document.getElementById('timerBadge').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestion >= questions.length) {
            showResults();
            return;
        }
        const q = questions[currentQuestion];
        document.getElementById('questionCount').innerText = `PREGUNTA ${currentQuestion + 1} DE 20`;
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('progressBar').style.width = `${(currentQuestion / 20) * 100}%`;

        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            grid.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        timeLeft = 20;
        document.getElementById('timerText').innerText = timeLeft;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timerText').innerText = timeLeft;
            if (timeLeft <= 0) checkAnswer(-1);
        }, 1000);
    }

    function checkAnswer(idx) {
        clearInterval(timer);
        const q = questions[currentQuestion];
        const overlay = document.getElementById('feedbackOverlay');
        const icon = document.getElementById('feedbackIcon');
        
        if (idx === q.a) {
            score++;
            icon.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i>';
            document.getElementById('feedbackTitle').innerText = "¡CORRECTO!";
            document.getElementById('feedbackTitle').style.color = "#2ecc71";
        } else {
            icon.innerHTML = '<i class="fas fa-times-circle" style="color:#e74c3c;"></i>';
            document.getElementById('feedbackTitle').innerText =
